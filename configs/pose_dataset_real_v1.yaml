# YOLO-pose dataset config for the wheel_real_v1 retrain.
#
# Layout produced by:
#   src/convert_keypoint_incoming_to_yolo_pose.py \
#     --source-root data/incoming/real_v1_qa \
#     --dataset-root data/wheel_pose_dataset_real_v1 \
#     --overwrite
#
# The source bundle is produced by scripts/qa_real_v1.sh (manual QA
# pass over the auto-drafts in data/incoming/real_v1/annotations).
#
# Historical real-v1 config. This dataset predates the strict floor-ray
# validator and must pass `src/check_yolo_pose_dataset.py` before it can
# be used for training.

path: data/wheel_pose_dataset_real_v1
train: images/train
val: images/val

names:
  0: wheel

# 3 keypoints per wheel, 3 dims each (x, y, visibility):
#   kp0 = a              — left floor-ray point near the wheel footprint
#   kp1 = b              — right floor-ray point near the wheel footprint
#   kp2 = c_disc_bottom  — lowest visible point of the metal disc
kpt_shape: [3, 3]

# Under horizontal flip A and B swap; C stays.
flip_idx: [1, 0, 2]
